<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HUZZ BATTLE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700&display=swap');

:root {
  --sky: #6CABDD;
  --dark-blue: #1C2C5B;
  --red: #FF6B6B;
  --gold: #FFD700;
  --bg: #0a0a0f;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:var(--bg);
  color:white;
  font-family:'Bebas Neue','Arial Black',Impact,sans-serif;
  overflow:hidden;
  touch-action:manipulation;
  -webkit-user-select:none; user-select:none;
  -webkit-tap-highlight-color:transparent;
}

body {
  display:flex; flex-direction:column; align-items:center;
  padding: 0 12px;
  gap: clamp(4px, 1.2vh, 12px);
}

body::before {
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(108,171,221,0.09) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 50%, rgba(255,80,80,0.07) 0%, transparent 55%);
  pointer-events:none; z-index:0;
}

/* TITLE */
.title {
  font-size: clamp(1.8rem, 8vw, 4.5rem);
  letter-spacing:0.12em; text-align:center;
  margin-top: clamp(8px, 2vh, 18px);
  background:linear-gradient(90deg,var(--sky),#fff,var(--red));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; line-height:1; z-index:1; position:relative;
}
.subtitle {
  font-family:'Barlow Condensed',Arial,sans-serif;
  font-size:clamp(0.6rem,2.5vw,0.85rem);
  letter-spacing:0.3em; color:rgba(255,255,255,0.3);
  text-transform:uppercase; z-index:1; position:relative;
}

/* SCORE BAR */
.bar-container {
  width:96%; max-width:680px; z-index:1; position:relative;
}
.names-row {
  display:flex; justify-content:space-between;
  font-size:clamp(1.1rem,4vw,1.6rem); letter-spacing:0.08em; margin-bottom:1px;
}
.levy-name  { color:var(--sky); }
.siebe-name { color:var(--red); }
.score-row {
  display:flex; justify-content:space-between;
  font-size:clamp(1.6rem,7vw,2.6rem); margin-bottom:4px;
}
.score-levy  { color:var(--sky); }
.score-siebe { color:var(--red); }
.bar-track {
  width:100%; height:clamp(18px,3vh,28px);
  background:rgba(0,0,0,0.4); border-radius:14px; overflow:hidden;
  border:1.5px solid rgba(255,255,255,0.08);
  display:flex; align-items:stretch;
}
.bar-levy {
  height:100%; min-width:0;
  background:linear-gradient(90deg,#1C2C5B,#6CABDD);
  border-radius:14px 0 0 14px;
  transition:width 0.1s ease;
}
.bar-siebe {
  height:100%; min-width:0; margin-left:auto;
  background:linear-gradient(90deg,#FF3333,#991111);
  border-radius:0 14px 14px 0;
  transition:width 0.1s ease;
}

/* ARENA */
.arena {
  width:100%; max-width:720px;
  height: clamp(160px, 32vh, 290px);
  position:relative; z-index:1;
  display:flex; align-items:flex-end; justify-content:space-between;
  padding:0 4px;
  flex-shrink:0;
}
.floor {
  position:absolute; bottom:0; left:0; right:0;
  height:clamp(30px,6vh,55px);
  background:linear-gradient(180deg,#181828 0%,#0f0f18 100%);
  border-top:2px solid rgba(108,171,221,0.12);
}
.rope-container {
  position:absolute; bottom:clamp(45px,10vh,78px);
  left:50%; transform:translateX(-50%);
  width:54%; height:16px;
  display:flex; align-items:center; z-index:1;
}
.rope {
  width:100%; height:6px;
  background:repeating-linear-gradient(90deg,#8B6914 0,#C99A0C 5px,#8B6914 10px);
  border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,0.6); position:relative;
}
.rope-knot {
  position:absolute; top:50%; transform:translate(-50%,-50%);
  width:15px; height:15px;
  background:radial-gradient(circle,#FFD700,#B8860B);
  border-radius:50%; border:2px solid rgba(255,255,255,0.4);
  box-shadow:0 0 10px rgba(255,215,0,0.7);
  transition:left 0.1s ease; z-index:3;
}
.character-wrap {
  display:flex; flex-direction:column; align-items:center;
  gap:2px; z-index:2;
}
.char-label { font-size:clamp(0.7rem,2.5vw,1rem); letter-spacing:0.12em; }

.levy-svg  { filter:drop-shadow(0 0 12px rgba(108,171,221,0.55)); }
.siebe-svg { filter:drop-shadow(0 0 12px rgba(255,80,80,0.5)); }
.levy-svg.pulling  { animation:pullL 0.18s ease; }
.siebe-svg.pulling { animation:pullR 0.2s ease; }

@keyframes pullL {
  0%  { transform:scaleX(1) rotate(0deg); }
  40% { transform:scaleX(1.07) rotate(-5deg) translateX(-3px); }
  100%{ transform:scaleX(1) rotate(0deg); }
}
@keyframes pullR {
  0%  { transform:scaleX(-1) rotate(0deg); }
  40% { transform:scaleX(-1.06) rotate(4deg) translateX(3px); }
  100%{ transform:scaleX(-1) rotate(0deg); }
}

/* HUD */
.hud {
  z-index:1; position:relative;
  display:flex; flex-direction:column; align-items:center;
  gap:clamp(3px,1vh,8px);
}
.stamina-row {
  display:flex; align-items:center; gap:7px;
  font-family:'Barlow Condensed',Arial,sans-serif;
  font-size:clamp(0.65rem,2.5vw,0.82rem);
  letter-spacing:0.15em; color:rgba(255,255,255,0.4);
}
.stamina-bar {
  width:clamp(80px,22vw,120px); height:6px;
  background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden;
}
.stamina-fill {
  height:100%; border-radius:3px;
  background:linear-gradient(90deg,#00ff88,#00cc66); transition:width 0.1s;
}
.combo-display {
  font-size:clamp(1.2rem,4vw,1.7rem);
  color:var(--gold); letter-spacing:0.1em;
  height:clamp(1.3rem,4vw,1.9rem);
}
.combo-display.pop { animation:cpop 0.2s ease; }
@keyframes cpop {
  0%  { transform:scale(1); }
  50% { transform:scale(1.45); }
  100%{ transform:scale(1); }
}

/* BIG TAP BUTTON */
.key-btn {
  width:  clamp(80px,22vw,110px);
  height: clamp(80px,22vw,110px);
  border-radius:clamp(12px,3vw,18px);
  background:linear-gradient(145deg,#1e3a5f,#0d1f38);
  border:3px solid var(--sky);
  font-size:clamp(2rem,8vw,3.2rem);
  color:white; cursor:pointer;
  box-shadow:0 6px 0 #07111e, 0 0 18px rgba(108,171,221,0.22);
  transition:all 0.07s ease;
  display:flex; align-items:center; justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.key-btn:active, .key-btn.pressed {
  transform:translateY(5px);
  box-shadow:0 1px 0 #07111e, 0 0 28px rgba(108,171,221,0.55);
  background:linear-gradient(145deg,#2a5a9f,#1d3a6f); border-color:white;
}
.key-hint {
  font-family:'Barlow Condensed',Arial,sans-serif;
  font-size:clamp(0.6rem,2vw,0.78rem);
  letter-spacing:0.25em; color:rgba(255,255,255,0.3); text-transform:uppercase;
}

/* PARTICLES */
.particle {
  position:fixed; pointer-events:none; z-index:99;
  font-family:'Bebas Neue','Arial Black',Impact,sans-serif;
  font-size:clamp(1rem,4vw,1.4rem);
  animation:floatUp 0.9s ease forwards;
}
@keyframes floatUp {
  0%  { opacity:1; transform:translateY(0) scale(1); }
  60% { opacity:1; transform:translateY(-50px) scale(1.2); }
  100%{ opacity:0; transform:translateY(-85px) scale(0.8); }
}

/* WIN SCREEN */
.win-screen {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,0.88);
  flex-direction:column; align-items:center; justify-content:center; gap:16px;
  padding:20px;
}
.win-screen.show { display:flex; }
.win-text {
  font-size:clamp(2.8rem,12vw,6.5rem);
  letter-spacing:0.1em; text-align:center;
  animation:winPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes winPop {
  from { transform:scale(0.3) rotate(-8deg); opacity:0; }
  to   { transform:scale(1) rotate(0deg); opacity:1; }
}
.win-levy  { color:var(--sky); text-shadow:0 0 40px var(--sky); }
.win-siebe { color:var(--red); text-shadow:0 0 40px var(--red); }
.win-sub {
  font-family:'Barlow Condensed',Arial,sans-serif;
  font-size:clamp(0.9rem,3.5vw,1.3rem);
  letter-spacing:0.25em; color:rgba(255,255,255,0.5); text-transform:uppercase;
  text-align:center;
}
.restart-btn {
  padding:clamp(10px,2vh,14px) clamp(24px,6vw,40px);
  background:transparent; border:2px solid white; color:white;
  font-family:'Bebas Neue','Arial Black',Impact,sans-serif;
  font-size:clamp(1.2rem,4vw,1.6rem); letter-spacing:0.2em;
  cursor:pointer; border-radius:8px; transition:all 0.2s; margin-top:8px;
}
.restart-btn:hover, .restart-btn:active { background:white; color:black; }
</style>
</head>

<script>
  let levyScore  = 0;
  let siebeScore = 0;
  let tugPos     = 50;
  let stamina    = 100;
  let combo      = 0;
  let gameActive = true;
  let siebeCool  = 12;
  let comboTO;

  const huzzWords  = ['HUZZ!','GEPULLED!','YOO!','AYY!','W!','NO CAP!','BUSSIN!','RIZZ!','SIGMA!'];
  const siebeWords = ['TUFF!','NAH!','EZ!','MY PULL!','L RATIO','GG'];

  function $(id){ return document.getElementById(id); }

  // ── SPAWN WORD ──
  function spawnWord(x, y, text, color){
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = text;
    p.style.cssText = `left:${x}px;top:${y}px;color:${color}`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 950);
  }

  // ── PRESS / TAP ──
  function pressX(){
    if(!gameActive || stamina <= 0) return;

    const btn = $('keyBtn');
    btn.classList.add('pressed');
    setTimeout(()=>btn.classList.remove('pressed'), 90);

    combo++;
    clearTimeout(comboTO);
    comboTO = setTimeout(()=>{ combo=0; renderCombo(); }, 700);

    const power = 1 + (combo > 10 ? 1 : 0);
    stamina   = Math.max(0, stamina - (7 + Math.random()*4));
    levyScore = Math.min(100, levyScore + power);

    // knoop beweegt naar Levy (links)
    tugPos = Math.max(0, tugPos - power * 0.6);

    const svg = $('levySvg');
    svg.classList.remove('pulling'); void svg.offsetWidth; svg.classList.add('pulling');

    const rect = btn.getBoundingClientRect();
    spawnWord(rect.left + Math.random()*80 - 20,
              rect.top  - 10 + Math.random()*20,
              huzzWords[Math.floor(Math.random()*huzzWords.length)],
              combo>8 ? '#FFD700' : '#6CABDD');

    render(); checkWin();
  }

  // ── SIEBE AI ──
  function siebeThink(){
    if(!gameActive) return;
    siebeCool--;
    if(siebeCool <= 0){
      const rage = tugPos < 60 ? 5 : 3.5;
      const pull = Math.round(rage + Math.random()*2.5);
      siebeScore = Math.min(100, siebeScore + pull);
      tugPos     = Math.min(100, tugPos + pull * 1.1);

      const svg = $('siebeSvg');
      svg.classList.remove('pulling'); void svg.offsetWidth; svg.classList.add('pulling');

      spawnWord(window.innerWidth - 140 + Math.random()*50,
                window.innerHeight * 0.55 + Math.random()*30,
                siebeWords[Math.floor(Math.random()*siebeWords.length)], '#FF6B6B');

      siebeCool = 8 + Math.floor(Math.random()*7);
      render(); checkWin();
    }
  }

  // ── RENDER ──
  function render(){
    $('barLevy').style.width   = levyScore + '%';
    $('barSiebe').style.width  = siebeScore + '%';
    $('ropeKnot').style.left   = tugPos + '%';
    $('scoreLevyDisplay').textContent  = levyScore;
    $('scoreSiebeDisplay').textContent = siebeScore;

    const st = Math.round(stamina);
    $('staminaFill').style.width = st + '%';
    $('staminaVal').textContent  = st;
    $('staminaFill').style.background =
      st>55 ? 'linear-gradient(90deg,#00ff88,#00cc66)' :
      st>25 ? 'linear-gradient(90deg,#ffcc00,#ff9900)' :
              'linear-gradient(90deg,#ff4444,#cc2200)';
    renderCombo();
  }

  function renderCombo(){
    const el = $('comboDisplay');
    if(combo >= 3){
      el.textContent = `🔥 x${combo} COMBO`;
      el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
    } else { el.textContent = ''; }
  }

  // ── WIN CHECK ──
  function checkWin(){
    if(levyScore  >= 100) endGame('levy');
    else if(siebeScore >= 100) endGame('siebe');
  }

  function endGame(winner){
    gameActive = false;
    let wt, ws, cls;
    if(winner === 'levy'){
      wt='🏆 LEVY WINT!'; cls='win-levy';
      ws=`KING VAN DE HUZZ! ${levyScore} – ${siebeScore}`;
    } else {
      wt='💪 SIEBE WINT!'; cls='win-siebe';
      ws=`SIEBE IS TE TUFF! ${siebeScore} – ${levyScore}`;
    }
    $('winText').textContent = wt;
    $('winText').className   = `win-text ${cls}`;
    $('winSub').textContent  = ws;
    $('winScreen').classList.add('show');
  }

  function restartGame(){
    levyScore=0; siebeScore=0; tugPos=50; stamina=100;
    combo=0; gameActive=true; siebeCool=12;
    $('winScreen').classList.remove('show');
    render();
  }

  // ── EVENTS ──
  // Keyboard
  document.addEventListener('keydown', e=>{
    if((e.key==='x'||e.key==='X') && !e.repeat) pressX();
  });

  // Touch + click on button (no delay)
  const btn = $('keyBtn');
  btn.addEventListener('touchstart', e=>{ e.preventDefault(); pressX(); }, {passive:false});
  btn.addEventListener('mousedown',  e=>{ pressX(); });

  // Restart
  $('restartBtn').addEventListener('touchstart', e=>{ e.preventDefault(); restartGame(); }, {passive:false});
  $('restartBtn').addEventListener('click', restartGame);

  // ── MAIN LOOP ──
  setInterval(()=>{
    if(!gameActive) return;
    siebeThink();
    stamina = Math.min(100, stamina + 0.22);
  }, 50);

  render();
</script>
</body>
</html>
