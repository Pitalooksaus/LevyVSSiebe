<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUZZ BATTLE – Levy vs Siebe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;900&display=swap');

  :root {
    --sky: #6CABDD;
    --dark-blue: #1C2C5B;
    --red: #FF6B6B;
    --gold: #FFD700;
    --bg: #0a0a0f;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    font-family: 'Bebas Neue', 'Arial Black', Impact, sans-serif;
    color: white;
    overflow: hidden;
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column; align-items: center;
    user-select: none;
  }

  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(108,171,221,0.09) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 50%, rgba(255,80,80,0.07) 0%, transparent 55%);
    pointer-events:none; z-index:0;
  }

  h1.title {
    font-size: clamp(2rem, 5.5vw, 4.5rem);
    letter-spacing: 0.15em; text-align: center; margin-top: 14px;
    background: linear-gradient(90deg, var(--sky), #fff, var(--red));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; z-index:1; position:relative; line-height:1;
  }

  .subtitle {
    font-size: 0.85rem; letter-spacing: 0.35em; color: rgba(255,255,255,0.3);
    margin-bottom: 4px; z-index:1; position:relative;
    font-family: 'Barlow Condensed', Arial, sans-serif; text-transform: uppercase;
  }

  .battle-bar-container {
    width: 88%; max-width: 680px; z-index:1; position:relative; margin: 6px 0;
  }
  .names-row {
    display:flex; justify-content:space-between; font-size:1.5rem;
    letter-spacing:0.1em; margin-bottom:2px;
  }
  .names-row .levy-name { color: var(--sky); }
  .names-row .siebe-name { color: var(--red); }

  .score-row {
    display:flex; justify-content:space-between;
    font-size: 2.4rem; font-weight:900; margin-bottom:4px;
  }
  .score-levy { color: var(--sky); }
  .score-siebe { color: var(--red); }

  .bar-track {
    width:100%; height:28px;
    background:rgba(0,0,0,0.3);
    border-radius:14px; overflow:hidden;
    border:1.5px solid rgba(255,255,255,0.08);
    position:relative; display:flex; align-items:stretch;
  }
  .bar-levy {
    height:100%;
    background: linear-gradient(90deg, #1C2C5B, #6CABDD);
    border-radius:14px 0 0 14px;
    transition: width 0.12s ease;
    min-width: 0;
  }
  .bar-siebe {
    height:100%;
    background: linear-gradient(90deg, #FF3333, #991111);
    border-radius:0 14px 14px 0;
    transition: width 0.12s ease;
    min-width: 0;
    margin-left:auto;
  }
  .bar-fill { display:none; }

  .arena {
    width:90%; max-width:720px; height:285px;
    position:relative; z-index:1;
    display:flex; align-items:flex-end; justify-content:space-between;
    padding:0 10px;
  }

  .character-wrap {
    display:flex; flex-direction:column; align-items:center; gap:3px; z-index:2;
  }
  .char-label { font-size:1rem; letter-spacing:0.15em; }

  .rope-container {
    position:absolute; bottom:75px; left:50%; transform:translateX(-50%);
    width:52%; height:20px; display:flex; align-items:center; z-index:1;
  }
  .rope {
    width:100%; height:7px;
    background: repeating-linear-gradient(90deg,#8B6914 0px,#C99A0C 5px,#8B6914 10px);
    border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,0.6); position:relative;
  }
  .rope-knot {
    position:absolute; top:50%; transform:translate(-50%,-50%);
    width:17px; height:17px;
    background:radial-gradient(circle,#FFD700,#B8860B);
    border-radius:50%; border:2px solid rgba(255,255,255,0.4);
    box-shadow:0 0 10px rgba(255,215,0,0.7);
    transition: left 0.1s ease; z-index:3;
  }

  .floor {
    position:absolute; bottom:0; left:0; right:0; height:55px;
    background:linear-gradient(180deg,#181828 0%,#0f0f18 100%);
    border-top:2px solid rgba(108,171,221,0.12);
  }

  .levy-svg  { filter: drop-shadow(0 0 16px rgba(108,171,221,0.55)); }
  .siebe-svg { filter: drop-shadow(0 0 16px rgba(255,80,80,0.5)); }
  .levy-svg.pulling  { animation: pullL 0.18s ease; }
  .siebe-svg.pulling { animation: pullR 0.2s ease; }

  @keyframes pullL {
    0%  { transform: scaleX(1) rotate(0deg); }
    40% { transform: scaleX(1.07) rotate(-5deg) translateX(-4px); }
    100%{ transform: scaleX(1) rotate(0deg); }
  }
  @keyframes pullR {
    0%  { transform: scaleX(-1) rotate(0deg); }
    40% { transform: scaleX(-1.06) rotate(4deg) translateX(4px); }
    100%{ transform: scaleX(-1) rotate(0deg); }
  }

  .hud {
    z-index:1; position:relative;
    display:flex; flex-direction:column; align-items:center; gap:5px; margin-top:2px;
  }
  .stamina-row {
    display:flex; align-items:center; gap:8px;
    font-size:0.8rem; letter-spacing:0.15em; color:rgba(255,255,255,0.4);
    font-family:'Barlow Condensed',Arial,sans-serif;
  }
  .stamina-bar {
    width:110px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden;
  }
  .stamina-fill {
    height:100%; border-radius:3px;
    background:linear-gradient(90deg,#00ff88,#00cc66); transition:width 0.1s;
  }
  .countdown { font-size:1rem; letter-spacing:0.2em; color:rgba(255,255,255,0.3); }

  .combo-display { font-size:1.7rem; color:var(--gold); letter-spacing:0.1em; height:1.9rem; }
  .combo-display.pop { animation: cpop 0.2s ease; }
  @keyframes cpop {
    0%  { transform:scale(1); }
    50% { transform:scale(1.45); }
    100%{ transform:scale(1); }
  }

  .key-btn {
    width:76px; height:76px; border-radius:12px;
    background:linear-gradient(145deg,#1e3a5f,#0d1f38);
    border:3px solid var(--sky); font-size:2.6rem; color:white; cursor:pointer;
    box-shadow:0 6px 0 #07111e, 0 0 18px rgba(108,171,221,0.22);
    transition:all 0.07s ease; display:flex; align-items:center; justify-content:center;
  }
  .key-btn:active, .key-btn.pressed {
    transform:translateY(5px);
    box-shadow:0 1px 0 #07111e, 0 0 28px rgba(108,171,221,0.55);
    background:linear-gradient(145deg,#2a5a9f,#1d3a6f); border-color:white;
  }
  .key-hint {
    font-size:0.78rem; letter-spacing:0.25em; color:rgba(255,255,255,0.3);
    font-family:'Barlow Condensed',Arial,sans-serif; text-transform:uppercase;
  }

  .particle {
    position:fixed; font-size:1.3rem; pointer-events:none; z-index:99;
    animation:floatUp 0.9s ease forwards;
  }
  @keyframes floatUp {
    0%  { opacity:1; transform:translateY(0) scale(1); }
    60% { opacity:1; transform:translateY(-55px) scale(1.2); }
    100%{ opacity:0; transform:translateY(-95px) scale(0.8); }
  }

  .win-screen {
    display:none; position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,0.87);
    flex-direction:column; align-items:center; justify-content:center; gap:18px;
  }
  .win-screen.show { display:flex; }
  .win-text {
    font-size:clamp(3rem,10vw,6.5rem); letter-spacing:0.1em; text-align:center;
    animation:winPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes winPop {
    from { transform:scale(0.3) rotate(-8deg); opacity:0; }
    to   { transform:scale(1) rotate(0deg); opacity:1; }
  }
  .win-levy  { color:var(--sky); text-shadow:0 0 40px var(--sky); }
  .win-siebe { color:var(--red); text-shadow:0 0 40px var(--red); }
  .win-sub {
    font-size:1.3rem; letter-spacing:0.3em; color:rgba(255,255,255,0.5);
    font-family:'Barlow Condensed',Arial,sans-serif; text-transform:uppercase;
  }
  .restart-btn {
    padding:12px 38px; background:transparent; border:2px solid white; color:white;
    font-size:1.5rem; letter-spacing:0.2em; cursor:pointer;
    border-radius:8px; transition:all 0.2s; margin-top:8px;
  }
  .restart-btn:hover { background:white; color:black; }
</style>
</head>
<body>

  <!-- SIEBE – stocky, short hair, tough streetwear -->
  <div class="character-wrap">
    <div class="char-label" style="color:var(--red)">SIEBE</div>
    <svg class="siebe-svg" id="siebeSvg" width="115" height="245" viewBox="0 0 115 245" xmlns="http://www.w3.org/2000/svg" style="transform:scaleX(-1)">

<!-- HUD -->
<div class="hud">
  <div class="stamina-row">
    <span>STAMINA</span>
    <div class="stamina-bar"><div class="stamina-fill" id="staminaFill" style="width:100%"></div></div>
    <span id="staminaVal">100</span>
    <span style="margin-left:10px" class="countdown">🏁 EERST 100!</span>
  </div>
  <div class="combo-display" id="comboDisplay"></div>
  <button class="key-btn" id="keyBtn" onclick="pressX()">X</button>
  <div class="key-hint">Druk X of klik de knop</div>
</div>

<div class="win-screen" id="winScreen">
  <div class="win-text" id="winText"></div>
  <div class="win-sub"  id="winSub"></div>
  <button class="restart-btn" onclick="restartGame()">↻ OPNIEUW</button>
</div>

<script>
  /*
    LOGICA:
    - tugPos gaat van 0 tot 100
    - tugPos hoog = Siebe wint (knoop naar Siebe = rechts)
    - tugPos laag = Levy wint (knoop naar Levy = links)
    - Start op 60 (Siebe al voor)
    - Levy drukt X → tugPos daalt (knoop naar links)
    - Siebe AI → tugPos stijgt (knoop naar rechts)
    - Balk vult van links = Siebe's dominantie
    - Win: tugPos <= 0 → Levy wint, tugPos >= 100 → Siebe wint
  */
  let levyScore  = 0;
  let siebeScore = 0;
  let tugPos     = 60;  // start al in Siebe's voordeel
  let stamina    = 100;
  let combo      = 0;
  let gameActive = true;
  let timeLeft   = 30;
  let siebeCool  = 12;
  let comboTO, timerIV;

  const huzzWords  = ['HUZZ!','GEPULLED!','YOO!','AYY!','W!','NO CAP!','BUSSIN!','RIZZ!','SIGMA!'];
  const siebeWords = ['TUFF!','NAH!','EZ!','MY PULL!','L RATIO','GG'];

  function $(id){ return document.getElementById(id); }

  function spawnWord(x, y, text, color){
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = text;
    p.style.cssText = `left:${x}px;top:${y}px;color:${color};font-family:'Bebas Neue','Arial Black',Impact,sans-serif`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 950);
  }

  function pressX(){
    if(!gameActive || stamina <= 0) return;

    const btn = $('keyBtn');
    btn.classList.add('pressed');
    setTimeout(()=>btn.classList.remove('pressed'), 90);

    combo++;
    clearTimeout(comboTO);
    comboTO = setTimeout(()=>{ combo=0; renderCombo(); }, 700);

    const power = 1 + (combo > 10 ? 1 : 0);

    stamina = Math.max(0, stamina - (7 + Math.random()*4));
    tugPos  = Math.max(0, tugPos - power * 0.55); // Levy trekt knoop naar links = tugPos daalt
    levyScore += power;

    const svg = $('levySvg');
    svg.classList.remove('pulling'); void svg.offsetWidth; svg.classList.add('pulling');

    spawnWord(70+Math.random()*70, 285+Math.random()*35,
              huzzWords[Math.floor(Math.random()*huzzWords.length)],
              combo>8 ? '#FFD700' : '#6CABDD');

    render(); checkWin();
  }

  function siebeThink(){
    if(!gameActive) return;
    siebeCool--;
    if(siebeCool <= 0){
      const rage = tugPos < 65 ? 5 : 3.5; // harder als Levy dichterbij komt
      const pull = rage + Math.random()*2.5;
      tugPos = Math.min(100, tugPos + pull * 1.3); // Siebe trekt naar rechts = tugPos stijgt
      siebeScore += Math.round(pull);

      const svg = $('siebeSvg');
      svg.classList.remove('pulling'); void svg.offsetWidth; svg.classList.add('pulling');

      spawnWord(window.innerWidth-210+Math.random()*60, 285+Math.random()*35,
                siebeWords[Math.floor(Math.random()*siebeWords.length)], '#FF6B6B');

      siebeCool = 8 + Math.floor(Math.random()*7);
      render(); checkWin();
    }
  }

  function render(){
    // balk: levy groeit van links, siebe van rechts, max 100 elk
    $('barLevy').style.width  = Math.min(levyScore, 100) + '%';
    $('barSiebe').style.width = Math.min(siebeScore, 100) + '%';
    $('ropeKnot').style.left  = tugPos+'%';
    $('scoreLevyDisplay').textContent  = levyScore;
    $('scoreSiebeDisplay').textContent = siebeScore;

    const st = Math.round(stamina);
    $('staminaFill').style.width = st+'%';
    $('staminaVal').textContent  = st;
    $('staminaFill').style.background =
      st>55 ? 'linear-gradient(90deg,#00ff88,#00cc66)' :
      st>25 ? 'linear-gradient(90deg,#ffcc00,#ff9900)' :
              'linear-gradient(90deg,#ff4444,#cc2200)';
    renderCombo();
  }

  function renderCombo(){
    const el = $('comboDisplay');
    if(combo >= 3){
      el.textContent = `🔥 x${combo} COMBO`;
      el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
    } else { el.textContent = ''; }
  }

  function checkWin(){
    if(levyScore >= 100) endGame('levy');
    else if(siebeScore >= 100) endGame('siebe');
  }

  function endGame(winner){
    gameActive = false; clearInterval(timerIV);
    let wt, ws, cls;
    if(winner==='levy'){
      wt='🏆 LEVY WINT!'; cls='win-levy';
      ws=`KING VAN DE HUZZ! (${levyScore} VS ${siebeScore})`;
    } else if(winner==='siebe'){
      wt='💪 SIEBE WINT!'; cls='win-siebe';
      ws=`SIEBE IS TE TUFF! (${siebeScore} VS ${levyScore})`;
    } else {
      // tijd op: wie heeft de knoop aan zijn kant?
      if(tugPos <= 50){
        wt='🏆 LEVY WINT!'; cls='win-levy';
        ws=`OP POSITIE! ${levyScore} VS ${siebeScore}`;
      } else {
        wt='💪 SIEBE WINT!'; cls='win-siebe';
        ws=`OP POSITIE! ${siebeScore} VS ${levyScore}`;
      }
    }
    $('winText').textContent = wt;
    $('winText').className = `win-text ${cls}`;
    $('winSub').textContent = ws;
    $('winScreen').classList.add('show');
  }

  function restartGame(){
    levyScore=0; siebeScore=0; tugPos=60; stamina=100;
    combo=0; gameActive=true; timeLeft=30; siebeCool=12;
    $('winScreen').classList.remove('show');
    render(); startTimer();
  }

  function startTimer(){ } // geen timer meer

  document.addEventListener('keydown', e=>{
    if((e.key==='x'||e.key==='X') && !e.repeat) pressX();
  });

  setInterval(()=>{
    if(!gameActive) return;
    siebeThink();
    stamina = Math.min(100, stamina + 0.22);
  }, 50);

  render();
  startTimer();
</script>
</body>
</html>
